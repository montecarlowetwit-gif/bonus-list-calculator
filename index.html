function key() {
 return "bonus_" + (employee.value||"employee") + "_" + week.value;
}

function load(){
 const data=JSON.parse(localStorage.getItem(key())||"{}");
 document.querySelectorAll("[data-id]").forEach(el=>{
   el.dataset.qty=data[el.dataset.id]||0;
 });
 render();
}

function save(){
 let data={};
 document.querySelectorAll("[data-id]").forEach(el=>data[el.dataset.id]=+el.dataset.qty);
 localStorage.setItem(key(),JSON.stringify(data));
 localStorage.setItem("employee_name",employee.value);
}

function render(){
 const q=search.value.toLowerCase();
 let total=0;
 list.innerHTML="";
 products.forEach((p,i)=>{
   if(q && !p.name.toLowerCase().includes(q)) return;
   const qty=(window.qtys?.[i]||0);
   total+=qty*p.bonus;
   list.innerHTML+=`
   <div class="card">
    <div class="name">${p.name}</div>
    <div class="small">Бонус: ${p.bonus} ₽</div>
    <div class="row">
      <button class="btn" onclick="change(${i},-1)">−</button>
      <div class="qty">${qty}</div>
      <button class="btn" onclick="change(${i},1)">+</button>
    </div>
    <div class="row"><b>Премия</b><b>${(qty*p.bonus).toFixed(2)} ₽</b></div>
   </div>`;
 });
 document.getElementById("total").innerHTML=total.toFixed(2)+" ₽";
 saveState();
}

window.qtys={};

function saveState(){
 localStorage.setItem(key()+"_qtys",JSON.stringify(window.qtys));
 localStorage.setItem("employee_name",employee.value);
}

function loadState(){
 employee.value=localStorage.getItem("employee_name")||"";
 window.qtys=JSON.parse(localStorage.getItem(key()+"_qtys")||"{}");
 render();
}

function change(i,d){
 window.qtys[i]=Math.max(0,(window.qtys[i]||0)+d);
 render();
}

employee.oninput=()=>{saveState();};
week.onchange=loadState;
