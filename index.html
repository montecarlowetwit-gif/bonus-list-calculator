let qtys={};

function storageKey(){return 'bonus_'+(employee.value||'user')+'_'+week.value;}

function save(){localStorage.setItem(storageKey(),JSON.stringify(qtys));localStorage.setItem('employee',employee.value);}
function load(){employee.value=localStorage.getItem('employee')||'';qtys=JSON.parse(localStorage.getItem(storageKey())||'{}');render();}

function change(i,d){qtys[i]=Math.max(0,(qtys[i]||0)+d);save();render();}

function render(){
 const q=search.value.toLowerCase();
 let total=0,count=0;
 list.innerHTML='';
 data.forEach((p,i)=>{
   if(cat!=='Все'&&p.cat!==cat)return;
   if(q && !p.name.toLowerCase().includes(q)) return;
   let qty=qtys[i]||0;
   total+=qty*p.bonus; count+=qty;
   list.innerHTML+=`<div class="card ${p.bonus>=700?'hi':''}">
   <div><b>${p.name}</b></div>
   <div>${p.cat} • Бонус ${p.bonus} ₽</div>
   <div class="row" style="margin-top:10px">
    <button class="btn" onclick="change(${i},-1)">−</button>
    <div class="qty">${qty}</div>
    <button class="btn" onclick="change(${i},1)">+</button>
   </div>
   <div class="row"><span>Премия</span><b>${(qty*p.bonus).toFixed(0)} ₽</b></div>

}
